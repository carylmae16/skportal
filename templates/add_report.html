<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Financial Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .hero {
            background: linear-gradient(135deg, #1a237e 0%, #b71c1c 60%, #f9a825 100%);
            color: white;
            padding: 24px 0;
            margin-bottom: 30px;
        }
        .hero img {
            width: 55px; height: 55px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .form-card {
            max-width: 600px;
            margin: 0 auto 60px auto;
            border-radius: 12px;
            border: none;
            border-top: 4px solid #b71c1c;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-card .card-header {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            border-radius: 8px 8px 0 0 !important;
            padding: 16px 20px;
            font-weight: 600;
        }
        .form-label { color: #1a237e; font-weight: 600; }
        .form-control:focus, .form-select:focus {
            border-color: #b71c1c;
            box-shadow: 0 0 0 0.2rem rgba(183,28,28,0.15);
        }
        .btn-sk {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-sk:hover { opacity: 0.9; color: white; }
        .footer-strip {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            text-align: center;
            padding: 16px;
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <img src="/static/logo.jpg" alt="Logo">
                <div>
                    <h5 class="mb-0 fw-bold">SK Council Dashboard</h5>
                    <small>Barangay Miranda, Hinigaran</small>
                </div>
            </div>
            <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="card form-card">
            <div class="card-header">💰 Add Financial Report</div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" name="title" class="form-control"
                               placeholder="e.g. SK Fund Release Q1 2024" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Type</label>
                        <select name="report_type" class="form-select" required>
                            <option value="Income">💚 Income</option>
                            <option value="Expense">🔴 Expense</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Amount (₱)</label>
                        <input type="number" name="amount" class="form-control"
                               placeholder="0.00" step="0.01" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" name="date" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"
                                  placeholder="Add details about this financial record"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-sk px-4">Save Report</button>
                        <a href="/sk" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="footer-strip">
        © Sangguniang Kabataan — Barangay Miranda, Hinigaran
    </div>

</body>
</html>
