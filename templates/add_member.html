<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .hero {
            background-color: #1a5276;
            color: white;
            padding: 24px 0;
            margin-bottom: 30px;
        }
        .hero img {
            width: 45px; height: 45px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 3px;
        }
        .form-card {
            max-width: 600px;
            margin: 0 auto 60px auto;
            border-radius: 12px;
            border: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-card .card-header {
            background-color: #1a5276;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 16px 20px;
            font-weight: 600;
        }
        .form-label { color: #1a5276; font-weight: 600; }
        .form-control:focus, .form-select:focus {
            border-color: #1a5276;
            box-shadow: 0 0 0 0.2rem rgba(26,82,118,0.15);
        }
        .btn-sk { background-color: #1a5276; color: white; border: none; }
        .btn-sk:hover { background-color: #154360; color: white; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <img src="/static/logo.jpg" alt="Logo">
                <div>
                    <h5 class="mb-0 fw-bold">SK Council Dashboard</h5>
                    <small>Barangay Miranda, Hinigaran</small>
                </div>
            </div>
            <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="card form-card">
            <div class="card-header">👥 Add Youth Member</div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <input type="text" name="name" class="form-control"
                               placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Age</label>
                        <input type="number" name="age" class="form-control"
                               placeholder="Enter age" min="15" max="30" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <input type="text" name="address" class="form-control"
                               placeholder="Enter address">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Number</label>
                        <input type="text" name="contact" class="form-control"
                               placeholder="Enter contact number">
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-sk px-4">Save Member</button>
                        <a href="/sk" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
