<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .form-card {
            max-width: 600px;
            margin: 40px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #1e8449;
            color: white;
            border-radius: 12px 12px 0 0 !important;
            padding: 18px 24px;
        }
        .btn-submit {
            background-color: #1e8449;
            color: white;
            width: 100%;
        }
        .btn-submit:hover {
            background-color: #196f3d;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card form-card">
            <div class="card-header">
                <h5 class="mb-0">➕ Add Youth Member</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="Enter full name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Age</label>
                        <input type="number" name="age" class="form-control" placeholder="Enter age" min="15" max="30" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Address</label>
                        <input type="text" name="address" class="form-control" placeholder="Enter complete address">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Contact Number</label>
                        <input type="text" name="contact" class="form-control" placeholder="Enter contact number">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Membership Status</label>
                        <select name="status" class="form-select">
                            <option value="Active">Active</option>
                            <option value="Inactive">Inactive</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-submit">Save Member</button>
                        <a href="/admin" class="btn btn-outline-secondary w-100">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
