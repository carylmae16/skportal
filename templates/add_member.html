<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Youth Member</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }
        .hero {
            background: linear-gradient(135deg, #1a237e 0%, #b71c1c 60%, #f9a825 100%);
            color: white;
            padding: 24px 0;
            margin-bottom: 30px;
        }
        .hero img {
            width: 55px; height: 55px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .form-card {
            max-width: 700px;
            margin: 0 auto 60px auto;
            border-radius: 12px;
            border: none;
            border-top: 4px solid #b71c1c;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-card .card-header {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            border-radius: 8px 8px 0 0 !important;
            padding: 16px 20px;
            font-weight: 600;
        }
        .section-title {
            color: #1a237e;
            font-weight: 700;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #b71c1c;
            padding-bottom: 6px;
            margin-bottom: 16px;
            margin-top: 8px;
        }
        .form-label { color: #1a237e; font-weight: 600; }
        .form-control:focus, .form-select:focus {
            border-color: #b71c1c;
            box-shadow: 0 0 0 0.2rem rgba(183,28,28,0.15);
        }
        .btn-sk {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-sk:hover { opacity: 0.9; color: white; }
        .footer-strip {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            text-align: center;
            padding: 16px;
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="hero">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <img src="/static/logo.jpg" alt="Logo">
                <div>
                    <h5 class="mb-0 fw-bold">SK Council Dashboard</h5>
                    <small>Barangay Miranda, Hinigaran</small>
                </div>
            </div>
            <a href="/logout" class="btn btn-sm btn-outline-light">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="card form-card">
            <div class="card-header">👥 Youth Profiling — Add Member</div>
            <div class="card-body p-4">
                <form method="POST">

                    <!-- I. PROFILE -->
                    <div class="section-title">I. Profile</div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control"
                                   placeholder="Last name" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" class="form-control"
                                   placeholder="First name" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Middle Name</label>
                            <input type="text" name="middle_name" class="form-control"
                                   placeholder="Middle name">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Region</label>
                            <input type="text" name="region" class="form-control"
                                   placeholder="Region">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Province</label>
                            <input type="text" name="province" class="form-control"
                                   placeholder="Province">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">City/Municipality</label>
                            <input type="text" name="city" class="form-control"
                                   placeholder="City/Municipality">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Barangay</label>
                            <input type="text" name="barangay" class="form-control"
                                   placeholder="Barangay" value="Miranda">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Age</label>
                            <input type="number" name="age" class="form-control"
                                   placeholder="Age" min="15" max="30" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Birthday (dd/mm/yy)</label>
                            <input type="date" name="birthday" class="form-control">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Sex Assigned at Birth</label>
                            <select name="sex" class="form-select" required>
                                <option value="">-- Select --</option>
                                <option value="Male">Male</option>
                                <option value="Female">Female</option>
                            </select>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="Email address">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label">Contact #</label>
                            <input type="text" name="contact" class="form-control"
                                   placeholder="Contact number">
                        </div>
                    </div>

                    <!-- II. DEMOGRAPHIC -->
                    <div class="section-title mt-3">II. Demographic Characteristics</div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Civil Status</label>
                            <select name="civil_status" class="form-select">
                                <option value="">-- Select --</option>
                                <option value="Single">Single</option>
                                <option value="Married">Married</option>
                                <option value="Widowed">Widowed</option>
                                <option value="Separated">Separated</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Youth Age Group</label>
                            <select name="youth_age_group" class="form-select">
                                <option value="">-- Select --</option>
                                <option value="Child Youth (15-17)">Child Youth (15-17)</option>
                                <option value="Core Youth (18-24)">Core Youth (18-24)</option>
                                <option value="Young Adult (25-30)">Young Adult (25-30)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-4">
                            <label class="form-label">Member Status</label>
                            <select name="status" class="form-select">
                                <option value="Active">Active</option>
                                <option value="Inactive">Inactive</option>
                            </select>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-sk px-4">Save Member</button>
                        <a href="/sk" class="btn btn-outline-secondary px-4">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </div>

    <div class="footer-strip">
        © Sangguniang Kabataan — Barangay Miranda, Hinigaran
    </div>

</body>
</html>
