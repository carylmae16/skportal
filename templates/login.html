<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f4f8;
        }
        .login-card {
            max-width: 420px;
            margin: 100px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #1a5276;
            color: white;
            text-align: center;
            border-radius: 12px 12px 0 0 !important;
            padding: 24px;
        }
        .btn-login {
            background-color: #1a5276;
            color: white;
            width: 100%;
        }
        .btn-login:hover {
            background-color: #154360;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-card">
            <div class="card-header">
                <h4 class="mb-0">🏛️ SK Portal</h4>
                <small>Sangguniang Kabataan Records System</small>
            </div>
            <div class="card-body p-4">
                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Password</label>
                        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-login">Login</button>
                </form>
                <hr>
                <div class="text-center">
                    <small class="text-muted">Want to view SK Projects?</small><br>
                    <a href="/" class="text-decoration-none">View Public Projects →</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
