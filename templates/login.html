<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK Portal - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; }

        .hero {
            background: linear-gradient(135deg, #1a237e 0%, #b71c1c 60%, #f9a825 100%);
            color: white;
            padding: 50px 0;
            margin-bottom: 30px;
        }
        .hero img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            border-radius: 50%;
            background: white;
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .hero h2 { font-weight: 700; font-size: 1.8rem; }

        .login-card {
            max-width: 420px;
            margin: 0 auto 60px auto;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border: none;
            border-top: 4px solid #b71c1c;
        }
        .login-card .card-header {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            text-align: center;
            border-radius: 8px 8px 0 0 !important;
            padding: 16px;
            font-weight: 600;
            font-size: 1rem;
        }
        .form-label { color: #1a237e; font-weight: 600; }
        .form-control:focus {
            border-color: #b71c1c;
            box-shadow: 0 0 0 0.2rem rgba(183,28,28,0.15);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn-login:hover { opacity: 0.9; color: white; }
        .back-link { color: #b71c1c; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #1a237e; }

        .footer-strip {
            background: linear-gradient(135deg, #1a237e, #b71c1c);
            color: white;
            text-align: center;
            padding: 16px;
            margin-top: 40px;
            font-size: 0.85rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <!-- Hero -->
    <div class="hero">
        <div class="container text-center">
            <img src="/static/logo.jpg" alt="Barangay Miranda Logo">
            <h2>Sangguniang Kabataan</h2>
            <p class="mb-1">Barangay Miranda, Hinigaran</p>
            <small>SK Records Management Portal</small>
        </div>
    </div>

    <!-- Login Card -->
    <div class="container">
        <div class="card login-card">
            <div class="card-header">🔐 Login as SK Official</div>
            <div class="card-body p-4">

                {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
                {% endif %}

                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" name="username" class="form-control"
                               placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-login">Login</button>
                </form>

                <hr>
                <div class="text-center">
                    <small class="text-muted">Want to view SK Projects?</small><br>
                    <a href="/" class="back-link">← View Public Projects</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <div class="footer-strip">
        © Sangguniang Kabataan — Barangay Miranda, Hinigaran
    </div>

</body>
</html>
